<!DOCTYPE html><html>
<head>
    <title>hookconnetor</title><style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #181818;
        color: white;
    }

    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #202020;
        padding: 10px 20px;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .logo {
        font-weight: bold;
        font-size: 22px;
        color: red;
    }

    .search-box input {
        padding: 8px;
        width: 300px;
        border-radius: 20px;
        border: none;
    }

    .container {
        display: flex;
    }

    .sidebar {
        width: 200px;
        background: #202020;
        padding: 10px;
        height: calc(100vh - 60px);
    }

    .sidebar a {
        display: block;
        padding: 10px;
        color: white;
        text-decoration: none;
    }

    .content {
        flex: 1;
        padding: 20px;
    }

    .videos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
    }

    .video-card {
        background: #202020;
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
    }

    .thumbnail img {
        width: 100%;
    }

    .video-player {
        display: none;
        margin-bottom: 20px;
    }

    iframe {
        width: 100%;
        height: 400px;
        border: none;
    }
</style>

</head><body><header>
    <div class="logo">hookconnetor</div>
    <div class="search-box">
        <input type="text" placeholder="Search">
    </div>
</header><div class="container"><div class="sidebar">
    <a href="#">Home</a>
    <a href="#">Trending</a>
    <a href="#">Subscriptions</a>
</div>

<div class="content">

    <!-- VIDEO PLAYER -->
    <div class="video-player" id="player">
        <iframe id="videoFrame" src=""></iframe>
    </div>

    <!-- VIDEO GRID -->
    <div class="videos">

        <div class="video-card" onclick="playVideo('https://www.youtube.com/embed/dQw4w9WgXcQ')">
            <div class="thumbnail">
                <img src=fc_20211203_0003.jp... >
            </div>
            <div style="padding:10px;">How to Build a Website</div>
        </div>

        <div class="video-card" onclick="playVideo('https://www.youtube.com/embed/UB1O30fR-EE')">
            <div class="thumbnail">
                <img src="https://img.youtube.com/vi/UB1O30fR-EE/0.jpg">
            </div>
            <div style="padding:10px;">Learn HTML in 10 Minutes</div>
        </div>

        <div class="video-card" onclick="playVideo('https://www.youtube.com/embed/yfoY53QXEnI')">
            <div class="thumbnail">
                <img src="https://img.youtube.com/vi/yfoY53QXEnI/0.jpg">
            </div>
            <div style="padding:10px;">CSS Tricks You Must Know</div>
        </div>

    </div>
</div>

</div><script>
    function playVideo(url) {
        const player = document.getElementById("player");
        const frame = document.getElementById("videoFrame");

        frame.src = url + "?autoplay=1";
        player.style.display = "block";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script></body>
</html>
